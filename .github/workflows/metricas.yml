name: Export de metricas

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI - Frontend
    branches:
      - main
    types:
      - completed
  pull_request:
    branches:
      - main
      - develop
    types: [closed]

jobs:
  metrics:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'NOT RELEASE') == false)
    runs-on: ubuntu-latest
    environment: actions

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias Python
        run: pip install python-dotenv packaging requests

      - name: Criar arquivo .env
        run: |
          touch ./sonar_scripts/.env
          echo GITHUB_TOKEN=${{ secrets.DOC_PUSH_TOKEN }} >> ./sonar_scripts/.env
          echo SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} >> ./sonar_scripts/.env
          echo RELEASE_MAJOR=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'MAJOR RELEASE') }} >> ./sonar_scripts/.env
          echo RELEASE_MINOR=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'MINOR RELEASE') }} >> ./sonar_scripts/.env
          echo RELEASE_FIX=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'FIX RELEASE') }} >> ./sonar_scripts/.env
          echo DEVELOP=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'DEVELOP') }} >> ./sonar_scripts/.env
          echo REPO=${{ github.event.repository.name }} >> ./sonar_scripts/.env
          echo REPO_DOC=2026-1-AnatoQuizUp-Doc >> ./sonar_scripts/.env

      - name: Criar diretorio
        run: mkdir -p analytics-raw-data

      - name: Coletar metricas no SonarCloud
        run: python ./sonar_scripts/parser.py

      - name: Enviar metricas para repo de Doc
        run: |
          git config --global user.email "${{ secrets.USER_EMAIL }}"
          git config --global user.name "${{ secrets.USER_NAME }}"
          git clone --single-branch --branch main "https://x-access-token:${{ secrets.DOC_PUSH_TOKEN }}@github.com/fga-eps-mds/2026-1-AnatoQuizUp-Doc.git" doc
          mkdir -p doc/analytics-raw-data/frontend
          cp -R analytics-raw-data/*.json doc/analytics-raw-data/frontend
          cp "$(ls -t analytics-raw-data/fga-eps-mds-*.json | head -n 1)" doc/analytics-raw-data/frontend/latest.json
          cd doc
          git add .
          git commit -m "Adicionando metricas do repositorio ${{ github.event.repository.name }} ${{ github.ref_name }}" || echo "Sem alteracoes para commitar"
          git push
