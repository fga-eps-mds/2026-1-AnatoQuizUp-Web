name: Release - Frontend

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Publicar Release com Asset e Métricas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extrair versão da tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # ex: v1.2.3
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          MAJOR=$(echo "$TAG" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "is_major=$( [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Compactar código-fonte e testes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="AnatoQuizUp-Front-${TAG}.zip"
          zip -r "$ARCHIVE" src/ package.json package-lock.json \
            sonar-project.properties tsconfig*.json \
            --exclude "*.DS_Store" "node_modules/*" "coverage/*" "dist/*" "build/*"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes com cobertura
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Aguardar SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Exportar metrics.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: fga-eps-mds_2026-1-AnatoQuizUp-Front
        run: |
          SEMESTER="2026_1"
          PROJECT_NAME="AnatoQuizUp"
          REPO_NAME="Front"
          DATE_HORA=$(date -u +"%m-%d-%Y-%H-%M-%S")
          VERSAO_RELEASE="${{ steps.version.outputs.tag }}"
          FILENAME="fga-eps-mds-${SEMESTER}_UNB-${PROJECT_NAME}-${REPO_NAME}-${DATE_HORA}-${VERSAO_RELEASE}.json"

          METRIC_LIST="files,functions,complexity,comment_lines_density,duplicated_lines_density,coverage,ncloc,tests,test_errors,test_failures,test_execution_time,security_rating"
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRIC_LIST}" \
            -o raw.json

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"timestamp\":\"$TIMESTAMP\",\"tag\":\"$VERSAO_RELEASE\",\"commit\":\"${{ github.sha }}\",\"filename\":\"$FILENAME\",\"data\":$(cat raw.json)}" > "$FILENAME"
          echo "METRICS_FILE=$FILENAME" >> $GITHUB_ENV
          cat "$FILENAME"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }} — Frontend"
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.METRICS_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar metrics.json em analytics-raw-data no repo de Doc
        env:
          DOC_PUSH_TOKEN: ${{ secrets.DOC_PUSH_TOKEN }}
        run: |
          if [ -z "$DOC_PUSH_TOKEN" ]; then
            echo "::warning::Secret DOC_PUSH_TOKEN não configurada — pulando commit no repo de doc."
            exit 0
          fi
          git clone --depth 1 https://x-access-token:$DOC_PUSH_TOKEN@github.com/fga-eps-mds/2026-1-AnatoQuizUp-Doc.git doc-repo
          cd doc-repo
          mkdir -p analytics-raw-data/frontend
          cp "../${{ env.METRICS_FILE }}" "analytics-raw-data/frontend/${{ env.METRICS_FILE }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics-raw-data/
          git commit -m "chore(metrics): release frontend ${{ steps.version.outputs.tag }} [skip ci]" || echo "Sem mudanças para commitar."
          git push
